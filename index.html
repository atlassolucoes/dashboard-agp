<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGP Life — Dashboard Financeiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f7f7f2;color:#1a1a2e;line-height:1.6}
:root{
--agp:#5BAD35;--agp-dk:#3D8A1E;--agp-lt:#E8F5E0;--agp-50:#f0f9eb;
--red:#E24B4A;--blue:#185FA5;--blue-lt:#E6F1FB;
--purple:#534AB7;--purple-lt:#EEEDFE;
--amber:#BA7517;--amber-lt:#FAEEDA;
--dark:#1a1a2e;--gray:#6b6b80;--lt-gray:#e8e8e2;
--card:#fff;--subtle:#f0f0ea}
.container{max-width:960px;margin:0 auto;padding:0 24px}
.header{background:var(--agp);padding:28px 0;color:#fff;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;right:-60px;top:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.08)}
.header-inner{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:52px;height:52px;border-radius:12px;border:2px solid rgba(255,255,255,.3)}
.header-title{font-size:26px;font-weight:800;letter-spacing:-.5px}
.header-sub{font-size:13px;opacity:.85}
.filter-bar{background:var(--card);border-radius:14px;padding:16px 20px;margin:-20px 0 24px;position:relative;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--lt-gray);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em}
.filter-bar select{padding:6px 12px;border-radius:8px;border:1px solid var(--lt-gray);font-family:inherit;font-size:13px;font-weight:600;background:var(--subtle);cursor:pointer}
.filter-bar .period-display{margin-left:auto;font-size:13px;color:var(--gray);font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.mc{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--lt-gray);transition:transform .2s}
.mc:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08)}
.mc-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);font-weight:600;margin-bottom:4px}
.mc-val{font-size:24px;font-weight:800;line-height:1.1}
.mc-sub{font-size:11px;color:var(--gray);margin-top:4px}
.vg{color:var(--agp-dk)}.vr{color:var(--red)}.vb{color:var(--blue)}
.section{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--lt-gray)}
.stitle{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stitle .ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.dre-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:7px;font-size:13px}
.dre-row:nth-child(even){background:var(--subtle)}
.dre-label{color:var(--gray);flex:1}
.dre-val{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.dre-total{display:flex;justify-content:space-between;border-top:2px solid var(--dark);padding-top:10px;margin-top:8px;font-weight:700;font-size:14px}
.tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:.04em}
.tag-op{background:var(--blue-lt);color:var(--blue)}
.tag-at{background:var(--amber-lt);color:var(--amber)}
.tag-green{background:var(--agp-lt);color:var(--agp-dk)}
.tag-purple{background:var(--purple-lt);color:var(--purple)}
.tag-dd{background:var(--agp-lt);color:var(--agp-dk)}
.tag-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.tc{border-radius:14px;padding:20px;border:1px solid var(--lt-gray)}
.tc-val{font-size:28px;font-weight:800;margin:6px 0 2px}
.tc-pct{font-size:12px;font-weight:600}
.tc-desc{font-size:11px;color:var(--gray);margin-top:6px;line-height:1.5}
.bar-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.bar-lbl{font-size:11px;color:var(--gray);min-width:110px;text-align:right;font-weight:500}
.bar-track{flex:1;height:22px;background:var(--subtle);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;min-width:fit-content;white-space:nowrap}
.bar-v{font-size:11px;color:var(--gray);min-width:75px;font-weight:600;font-variant-numeric:tabular-nums}
.chart-wrap{position:relative;width:100%;height:280px;margin:12px 0}
.chart-legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--gray);margin-top:6px}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
.dd-box{background:linear-gradient(135deg,var(--agp-50),var(--agp-lt));border:2px solid var(--agp);border-radius:16px;padding:24px;margin-bottom:16px}
.dd-box .stitle{color:var(--agp-dk)}
.dd-total-box{background:var(--agp);border-radius:12px;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:#fff}
.dd-total-box .lb{font-size:15px;font-weight:700}
.dd-total-box .vl{font-size:26px;font-weight:800}
.resultado-box{background:var(--dark);border-radius:14px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.resultado-box .lb{color:#fff;font-size:15px;font-weight:700}
.resultado-box .vl{font-size:26px;font-weight:800}
.resultado-box .sb{color:rgba(255,255,255,.5);font-size:11px}
.insight-box{background:var(--subtle);border-left:4px solid var(--agp);border-radius:0 12px 12px 0;padding:18px 22px;margin-top:20px}
.insight-box h3{font-size:14px;font-weight:700;margin-bottom:8px}
.insight-box p{font-size:12px;color:var(--gray);line-height:1.7;margin-bottom:6px}
.footer{text-align:center;padding:28px 0;font-size:11px;color:var(--gray)}

/* DETAIL TABLE */
.detail-section{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--lt-gray)}
.detail-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.detail-filters select,.detail-filters input{padding:7px 12px;border-radius:8px;border:1px solid var(--lt-gray);font-family:inherit;font-size:12px;font-weight:500;background:var(--subtle)}
.detail-filters input{flex:1;min-width:140px}
.detail-table{width:100%;border-collapse:collapse;font-size:12px}
.detail-table thead{position:sticky;top:0;z-index:1}
.detail-table th{background:var(--dark);color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap}
.detail-table th:hover{background:#2a2a3e}
.detail-table th .arrow{font-size:9px;margin-left:3px;opacity:.5}
.detail-table th.sorted .arrow{opacity:1}
.detail-table td{padding:7px 10px;border-bottom:1px solid var(--lt-gray);vertical-align:top}
.detail-table tr:hover td{background:var(--agp-50)}
.detail-table .td-val{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right}
.detail-table .td-tag{font-size:10px}
.detail-table .td-date{white-space:nowrap;color:var(--gray);font-size:11px}
.detail-table .td-forn{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-scroll{max-height:500px;overflow-y:auto;border:1px solid var(--lt-gray);border-radius:10px}
.detail-summary{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--gray);flex-wrap:wrap}
.detail-summary strong{color:var(--dark)}

@media(max-width:700px){
.metrics{grid-template-columns:repeat(2,1fr)}
.tag-cards{grid-template-columns:1fr}
.mc-val{font-size:18px}
.header-title{font-size:20px}
.filter-bar{flex-direction:column;align-items:flex-start}
.filter-bar .period-display{margin-left:0;margin-top:4px}
.detail-filters{flex-direction:column}
.detail-table{font-size:11px}
.detail-table td,.detail-table th{padding:5px 6px}
}
</style>
</head>

<div class="section" id="entradasSection"></div>
<div class="section" id="tagSection"></div>

<div class="stitle"><div class="ic" style="background:var(--agp-lt);">📈</div>Evolução mensal — receita vs despesa</div>
<div class="chart-wrap"><canvas id="chartMensal"></canvas></div>
<div class="chart-legend">
<span><i style="background:#5BAD35;"></i> Receita vendas</span>
<span><i style="background:#E24B4A;"></i> Despesas totais</span>
<span><i style="background:#185FA5;"></i> Aportes sócios</span>

</div>

<div id="prodBars"></div>

</div>
</div>

<div class="section" id="insightSection"></div>

  const ddAportesAll=DATA.aportes.filter(r=>r.tipo==='APORTE_DD').reduce((s,r)=>s+r.valor,0);
  const ddDespAll=DATA.despesas.filter(r=>r.pago_por==='DD').reduce((s,r)=>s+r.valor,0);
  ddHTML+=`<div style="margin-top:12px;font-size:11px;color:var(--gray);text-align:center">Acumulado total (desde out/2025): Aportes ${fmtK(ddAportesAll)} + Despesas ${fmtK(ddDespAll)} = <strong style="color:var(--agp-dk)">${fmt(ddAportesAll+ddDespAll)}</strong></div>`;
  document.getElementById('ddSection').innerHTML=ddHTML;

  // INSIGHTS
  const nMeses=Math.max(activeMeses.length,1);
  const custoFixoMensal=desp.filter(r=>r.modelo==='FIXO'&&r.tag==='OPERAÇÃO').reduce((s,r)=>s+r.valor,0)/nMeses;
  document.getElementById('insightSection').innerHTML=`<div class="insight-box"><h3>Leitura para os sócios</h3>
    <p>O resultado de <strong>${fmt(resultado)}</strong> no período reflete o <strong>investimento em ativação</strong> (${fmtK(despAt)}). Se isolarmos apenas a operação, o déficit operacional seria de ${fmtK(despOp)} — coberto parcialmente pelas vendas (${fmtK(totalRec)}) e patrocínios (${fmtK(patrocinios)}).</p>
    <p>A ativação não é "prejuízo puro" — ela gerou os ${fmtK(patrocinios)} em patrocínios e visibilidade de marca que impulsiona vendas futuras.</p>
    <p>Custos fixos mensais de operação: <strong>${fmtK(custoFixoMensal)}/mês</strong>. A DD Business já investiu <strong>${fmt(ddAportesAll+ddDespAll)}</strong> no projeto no total.</p></div>`;

  // DETAIL TABLE
  renderDetail(desp);
}

function renderDetail(allDesp){
  const cats=Array.from(new Set(allDesp.map(r=>r.categoria).filter(Boolean))).sort();
  let filtered=allDesp.slice();
  if(detailFilterTag!=='TODOS')filtered=filtered.filter(r=>r.tag===detailFilterTag);
  if(detailFilterCat!=='TODOS')filtered=filtered.filter(r=>r.categoria===detailFilterCat);
  if(detailSearch){const s=detailSearch.toLowerCase();filtered=filtered.filter(r=>(r.fornecedor||'').toLowerCase().includes(s)||(r.descricao||'').toLowerCase().includes(s)||(r.subcategoria||'').toLowerCase().includes(s));}

  filtered.sort((a,b)=>{
    let va,vb;
    if(detailSort.col==='data'){va=a.data;vb=b.data;}
    else if(detailSort.col==='valor'){va=a.valor;vb=b.valor;}
    else if(detailSort.col==='fornecedor'){va=(a.fornecedor||'').toLowerCase();vb=(b.fornecedor||'').toLowerCase();}
    else if(detailSort.col==='categoria'){va=(a.categoria||'');vb=(b.categoria||'');}
    else{va=a.data;vb=b.data;}
    if(va<vb)return detailSort.asc?-1:1;if(va>vb)return detailSort.asc?1:-1;return 0;
  });

  const totalFiltered=filtered.reduce((s,r)=>s+r.valor,0);
  const arrow=col=>detailSort.col===col?(detailSort.asc?'▲':'▼'):'⇅';

  let html=`<div class="stitle"><div class="ic" style="background:var(--subtle);">🔍</div>Detalhamento de despesas</div>
    <div class="detail-filters">
      <select id="dfTag" onchange="detailFilterTag=this.value;render()"><option value="TODOS">Todas as TAGs</option><option value="OPERAÇÃO" ${detailFilterTag==='OPERAÇÃO'?'selected':''}>Operação</option><option value="ATIVAÇÃO" ${detailFilterTag==='ATIVAÇÃO'?'selected':''}>Ativação</option></select>
      <select id="dfCat" onchange="detailFilterCat=this.value;render()"><option value="TODOS">Todas as categorias</option>${cats.map(c=>`<option value="${c}" ${detailFilterCat===c?'selected':''}>${c}</option>`).join('')}</select>
      <input type="text" id="dfSearch" placeholder="Buscar fornecedor ou descrição..." value="${detailSearch}" oninput="detailSearch=this.value;render()">
    </div>
    <div class="detail-scroll"><table class="detail-table">
    <thead><tr>
      <th onclick="sortDetail('data')" class="${detailSort.col==='data'?'sorted':''}">Data <span class="arrow">${arrow('data')}</span></th>
      <th onclick="sortDetail('fornecedor')" class="${detailSort.col==='fornecedor'?'sorted':''}">Fornecedor <span class="arrow">${arrow('fornecedor')}</span></th>
      <th>Descrição</th>
      <th onclick="sortDetail('categoria')" class="${detailSort.col==='categoria'?'sorted':''}">Categoria <span class="arrow">${arrow('categoria')}</span></th>
      <th>TAG</th>
      <th>Pago por</th>
      <th onclick="sortDetail('valor')" class="${detailSort.col==='valor'?'sorted':''}">Valor <span class="arrow">${arrow('valor')}</span></th>
    </tr></thead><tbody>`;
  filtered.forEach(r=>{
    const tagCls=r.tag==='OPERAÇÃO'?'tag-op':'tag-at';
    html+=`<tr>
      <td class="td-date">${fmtDate(r.data)}</td>
      <td class="td-forn" title="${r.fornecedor}">${r.fornecedor}</td>
      <td title="${r.descricao}">${(r.descricao||'').substring(0,50)}${(r.descricao||'').length>50?'...':''}</td>
      <td><span style="font-size:10px">${r.categoria||''}</span></td>
      <td class="td-tag"><span class="tag ${tagCls}">${r.tag}</span></td>
      <td style="font-size:11px">${r.pago_por}</td>
      <td class="td-val vr">${fmt(r.valor)}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>
    <div class="detail-summary">
      <span><strong>${filtered.length}</strong> registros</span>
      <span>Total: <strong class="vr">${fmt(totalFiltered)}</strong></span>
    </div>`;
  document.getElementById('detailSection').innerHTML=html;
}

function sortDetail(col){
  if(detailSort.col===col)detailSort.asc=!detailSort.asc;
  else{detailSort.col=col;detailSort.asc=col==='valor'?false:true;}
  render();
}

selInicio.addEventListener('change',render);
selFim.addEventListener('change',render);
render();
</script>
</body>
</html>
