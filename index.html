<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGP Life — Dashboard Financeiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f7f7f2;color:#1a1a2e;line-height:1.6}
:root{--agp:#5BAD35;--agp-dk:#3D8A1E;--agp-lt:#E8F5E0;--agp-50:#f0f9eb;--red:#E24B4A;--blue:#185FA5;--blue-lt:#E6F1FB;--purple:#534AB7;--purple-lt:#EEEDFE;--amber:#BA7517;--amber-lt:#FAEEDA;--dark:#1a1a2e;--gray:#6b6b80;--lt-gray:#e8e8e2;--card:#fff;--subtle:#f0f0ea}
.container{max-width:960px;margin:0 auto;padding:0 24px}
.header{background:var(--agp);padding:28px 0;color:#fff;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;right:-60px;top:-60px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.08)}
.header-inner{display:flex;align-items:center;position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:52px;height:52px;border-radius:12px;border:2px solid rgba(255,255,255,.3)}
.header-title{font-size:26px;font-weight:800;letter-spacing:-.5px}.header-sub{font-size:13px;opacity:.85}
.tabs-bar{display:flex;gap:0;margin:-20px 0 0;position:relative;z-index:3}
.tab-btn{flex:1;padding:14px 20px;font-family:inherit;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s;border-radius:14px 14px 0 0;background:var(--subtle);color:var(--gray)}
.tab-btn.active{background:var(--card);color:var(--dark);box-shadow:0 -2px 8px rgba(0,0,0,.06)}.tab-btn:hover:not(.active){background:var(--lt-gray)}
.tab-content{display:none}.tab-content.active{display:block}
.filter-bar{background:var(--card);border-radius:0 0 14px 14px;padding:16px 20px;margin:0 0 24px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--lt-gray);border-top:none;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.06em}
.filter-bar input[type=date]{padding:6px 10px;border-radius:8px;border:1px solid var(--lt-gray);font-family:inherit;font-size:13px;font-weight:600;background:var(--subtle);cursor:pointer}
.filter-bar .period-display{margin-left:auto;font-size:13px;color:var(--gray);font-weight:500}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.mc{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--lt-gray);transition:transform .2s}
.mc:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.08)}
.mc-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);font-weight:600;margin-bottom:4px}
.mc-val{font-size:24px;font-weight:800;line-height:1.1}.mc-sub{font-size:11px;color:var(--gray);margin-top:4px}
.vg{color:var(--agp-dk)}.vr{color:var(--red)}.vb{color:var(--blue)}
.section{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--lt-gray)}
.stitle{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stitle .ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.dre-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:7px;font-size:13px}
.dre-row:nth-child(even){background:var(--subtle)}
.dre-label{color:var(--gray);flex:1}.dre-val{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.dre-total{display:flex;justify-content:space-between;border-top:2px solid var(--dark);padding-top:10px;margin-top:8px;font-weight:700;font-size:14px}
.tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:.04em}
.tag-op{background:var(--blue-lt);color:var(--blue)}.tag-at{background:var(--amber-lt);color:var(--amber)}.tag-green{background:var(--agp-lt);color:var(--agp-dk)}.tag-purple{background:var(--purple-lt);color:var(--purple)}.tag-dd{background:var(--agp-lt);color:var(--agp-dk)}
.tag-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.tc{border-radius:14px;padding:20px;border:1px solid var(--lt-gray)}.tc-val{font-size:28px;font-weight:800;margin:6px 0 2px}.tc-pct{font-size:12px;font-weight:600}.tc-desc{font-size:11px;color:var(--gray);margin-top:6px;line-height:1.5}
.bar-row{display:flex;align-items:center;gap:8px;margin:5px 0}
.bar-lbl{font-size:11px;color:var(--gray);min-width:110px;text-align:right;font-weight:500}
.bar-track{flex:1;height:22px;background:var(--subtle);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;min-width:fit-content;white-space:nowrap}
.bar-v{font-size:11px;color:var(--gray);min-width:75px;font-weight:600;font-variant-numeric:tabular-nums}
.chart-wrap{position:relative;width:100%;height:280px;margin:12px 0}
.chart-legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:var(--gray);margin-top:6px}
.chart-legend span{display:flex;align-items:center;gap:4px}
.chart-legend i{width:9px;height:9px;border-radius:2px;display:inline-block}
.dd-box{background:linear-gradient(135deg,var(--agp-50),var(--agp-lt));border:2px solid var(--agp);border-radius:16px;padding:24px;margin-bottom:16px}
.dd-box .stitle{color:var(--agp-dk)}
.dd-total-box{background:var(--agp);border-radius:12px;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:#fff}
.dd-total-box .lb{font-size:15px;font-weight:700}.dd-total-box .vl{font-size:26px;font-weight:800}
.resultado-box{background:var(--dark);border-radius:14px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.resultado-box .lb{color:#fff;font-size:15px;font-weight:700}.resultado-box .vl{font-size:26px;font-weight:800}.resultado-box .sb{color:rgba(255,255,255,.5);font-size:11px}
.insight-box{background:var(--subtle);border-left:4px solid var(--agp);border-radius:0 12px 12px 0;padding:18px 22px;margin-top:20px}
.insight-box h3{font-size:14px;font-weight:700;margin-bottom:8px}.insight-box p{font-size:12px;color:var(--gray);line-height:1.7;margin-bottom:6px}
.footer{text-align:center;padding:28px 0;font-size:11px;color:var(--gray)}
.detail-section{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid var(--lt-gray)}
.detail-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.detail-filters select,.detail-filters input{padding:7px 10px;border-radius:8px;border:1px solid var(--lt-gray);font-family:inherit;font-size:11px;font-weight:500;background:var(--subtle)}
.detail-filters input{flex:1;min-width:160px}.detail-filters select{max-width:160px}
.detail-table{width:100%;border-collapse:collapse;font-size:11px}
.detail-table thead{position:sticky;top:0;z-index:1}
.detail-table th{background:var(--dark);color:#fff;padding:7px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;user-select:none;white-space:nowrap}
.detail-table th:hover{background:#2a2a3e}
.detail-table th .arrow{font-size:8px;margin-left:2px;opacity:.5}.detail-table th.sorted .arrow{opacity:1}
.detail-table td{padding:6px 8px;border-bottom:1px solid var(--lt-gray);vertical-align:top}
.detail-table tr:hover td{background:var(--agp-50)}
.detail-table .td-val{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;text-align:right}
.detail-table .td-date{white-space:nowrap;color:var(--gray);font-size:10px}
.detail-table .td-forn{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-table .td-small{font-size:10px;color:var(--gray)}
.detail-scroll{max-height:520px;overflow-y:auto;border:1px solid var(--lt-gray);border-radius:10px}
.detail-summary{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--gray);flex-wrap:wrap}.detail-summary strong{color:var(--dark)}
.status-pago{color:var(--agp-dk);font-weight:600}.status-pendente{color:var(--amber);font-weight:600}
.rec-table{width:100%;border-collapse:collapse;font-size:11px}
.rec-table th{background:var(--agp);color:#fff;padding:7px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap}
.rec-table th:hover{background:var(--agp-dk)}.rec-table td{padding:6px 8px;border-bottom:1px solid var(--lt-gray)}
.rec-table tr:hover td{background:var(--agp-50)}
.rec-scroll{max-height:500px;overflow-y:auto;border:1px solid var(--lt-gray);border-radius:10px}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}.tag-cards{grid-template-columns:1fr}.mc-val{font-size:18px}.header-title{font-size:20px}.filter-bar{flex-direction:column;align-items:flex-start}.filter-bar .period-display{margin-left:0;margin-top:4px}.detail-filters{flex-direction:column}.detail-filters select{max-width:100%}.detail-table{font-size:10px}.detail-table td,.detail-table th{padding:4px 5px}.tabs-bar{flex-direction:column;gap:2px}.tab-btn{border-radius:8px}}
</style>
</head>

// ============ RECEITAS ============
const eRDI=document.getElementById('recDataInicio'),eRDF=document.getElementById('recDataFim');
function renderReceitas(){
  const di=eRDI.value,dff=eRDF.value;
  document.getElementById('recPeriodDisplay').textContent=fmtDate(di)+' a '+fmtDate(dff);
  const rec=DATA.receitas.filter(r=>r.data>=di&&r.data<=dff);
  const tR=rec.reduce((s,r)=>s+r.valor,0),tm=rec.length>0?tR/rec.length:0;
  const porDia={};rec.forEach(r=>{porDia[r.data]=(porDia[r.data]||0)+r.valor;});
  const dias=Object.keys(porDia).sort();
  let mD='',mDV=0;dias.forEach(d=>{if(porDia[d]>mDV){mDV=porDia[d];mD=d;}});
  const comCupom=rec.filter(r=>r.cupom).length,semCupom=rec.filter(r=>!r.cupom).length;
  const recCC=rec.filter(r=>r.cupom).reduce((s,r)=>s+r.valor,0);
  const compradoresUnicos=new Set(rec.map(r=>r.comprador)).size;

  document.getElementById('recMetrics').innerHTML=`
    <div class="mc"><div class="mc-label">Receita total</div><div class="mc-val vg">${fmtK(tR)}</div><div class="mc-sub">${rec.length} pedidos · ${compradoresUnicos} compradores</div></div>
    <div class="mc"><div class="mc-label">Ticket médio</div><div class="mc-val vg">${fmt(Math.round(tm))}</div><div class="mc-sub">por pedido</div></div>
    <div class="mc"><div class="mc-label">Melhor dia</div><div class="mc-val vg">${fmtK(mDV)}</div><div class="mc-sub">${mD?fmtDate(mD):'-'}</div></div>
    <div class="mc"><div class="mc-label">Vendas com cupom</div><div class="mc-val vb">${comCupom}</div><div class="mc-sub">${rec.length>0?Math.round(comCupom/rec.length*100):0}% · ${fmtK(recCC)}</div></div>`;

  if(cVD)cVD.destroy();
  cVD=new Chart(document.getElementById('chartVendasDia'),{type:'bar',data:{labels:dias.map(fmtDS),datasets:[{data:dias.map(d=>porDia[d]),backgroundColor:'#5BAD35',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'rgba(0,0,0,.4)',font:{size:9},maxRotation:45}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'rgba(0,0,0,.4)',font:{size:10},callback:v=>'R$ '+Math.round(v/1000)+'K'}}}}});

  // CUPOM RANKING
  const cD={};rec.forEach(r=>{const c=r.cupom||'Sem cupom';if(!cD[c])cD[c]={n:c,v:0,q:0};cD[c].v+=r.valor;cD[c].q++;});
  const cR=Object.values(cD).sort((a,b)=>b.v-a.v);const mC=cR.length>0?cR[0].v:1;
  let cH=`<div class="stitle"><div class="ic" style="background:var(--amber-lt);">🏆</div>Ranking de cupons</div><div style="font-size:12px;color:var(--gray);margin-bottom:12px">${Object.keys(cD).length-1} cupons · ${comCupom} vendas com cupom (${fmtK(recCC)})</div>`;
  cR.forEach((c,i)=>{const p=mC>0?Math.round(c.v/mC*100):0;const md=i<3&&c.n!=='Sem cupom'?['🥇','🥈','🥉'][i]:'';const bg=c.n==='Sem cupom'?'var(--lt-gray)':'var(--agp)';const tc=c.n==='Sem cupom'?'color:var(--gray)':'';
    cH+=`<div class="bar-row"><span class="bar-lbl" style="${tc}">${md} ${c.n}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(p,3)}%;background:${bg};">${c.q}x</div></div><span class="bar-v">${fmtK(c.v)}</span></div>`;});
  document.getElementById('recCupomSection').innerHTML=cH;

  // PRODUTO
  const pC={};rec.forEach(r=>{let p=r.produto;if(p.includes('2x'))p='2x Creatina';else if(p.includes('3x'))p='3x Creatina';else if(p.includes('6x'))p='6x Creatina';else if(p.includes('Garrafa'))p='Garrafa';else p='1x Creatina';pC[p]=(pC[p]||0)+r.valor;});
  const pO=['2x Creatina','1x Creatina','6x Creatina','3x Creatina','Garrafa'],pCl=['#185FA5','#378ADD','#85B7EB','#B5D4F4','#E6F1FB'];
  let pH=`<div class="stitle"><div class="ic" style="background:var(--blue-lt);">🧪</div>Receita por produto</div>`;
  pO.forEach((p,i)=>{const v=pC[p]||0,pc=tR>0?Math.round(v/tR*100):0;const cn=rec.filter(r=>{let n=r.produto;if(n.includes('2x'))n='2x Creatina';else if(n.includes('3x'))n='3x Creatina';else if(n.includes('6x'))n='6x Creatina';else if(n.includes('Garrafa'))n='Garrafa';else n='1x Creatina';return n===p;}).length;const tk=cn>0?v/cn:0;
    pH+=`<div class="bar-row"><span class="bar-lbl">${p}</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(pc,2)}%;background:${pCl[i]};${pc<15?'color:#042C53':''}">${pc>4?pc+'%':''}</div></div><span class="bar-v">${fmtK(v)} <span style="font-size:9px;color:var(--gray)">(${cn}x · TM ${fmt(Math.round(tk))})</span></span></div>`;});

function renderRevenueDetail(allAp, allRec){
  // Combine aportes + receitas into one list for the revenue detail
  let items = [];
  allAp.forEach(r => {
    const isP = r.tipo === 'PATROCINIO';
    const isDD = r.tipo === 'APORTE_DD';
    const isMusic = r.tipo === 'APORTE_MUSIC';
    const isRepasse = r.tipo === 'REPASSE_VENDAS';
    const isRend = r.tipo === 'RENDIMENTO';
    let tipo = isP ? 'Patrocínio' : (isDD ? 'Aporte DD' : (isMusic ? 'Aporte Music' : (isRepasse ? 'Repasse Vendas' : 'Rendimento')));
    items.push({data: r.data, nome: r.nome || r.produto_raw || '', tipo: tipo, desc: r.descricao || '', valor: r.valor, fonte: 'aporte'});
  });

  // Filters
  const tipos = Array.from(new Set(items.map(r => r.tipo))).sort();
  const nomes = Array.from(new Set(items.map(r => r.nome).filter(Boolean))).sort();

  let filtered = items.slice();
  if(rvf.tipo !== 'TODOS') filtered = filtered.filter(r => r.tipo === rvf.tipo);
  if(rvf.nome !== 'TODOS') filtered = filtered.filter(r => r.nome === rvf.nome);
  if(rvf.search) { const s = rvf.search.toLowerCase(); filtered = filtered.filter(r => (r.nome||'').toLowerCase().includes(s) || (r.desc||'').toLowerCase().includes(s)); }

  filtered.sort((a,b) => {
    let va, vb;
    if(rvSort.col === 'data'){va=a.data;vb=b.data;}
    else if(rvSort.col === 'valor'){va=a.valor;vb=b.valor;}
    else if(rvSort.col === 'nome'){va=(a.nome||'').toLowerCase();vb=(b.nome||'').toLowerCase();}
    else if(rvSort.col === 'tipo'){va=a.tipo;vb=b.tipo;}
    else{va=a.data;vb=b.data;}
    if(va<vb)return rvSort.asc?-1:1;if(va>vb)return rvSort.asc?1:-1;return 0;
  });

  const totalF = filtered.reduce((s,r) => s + r.valor, 0);
  const ar = c => rvSort.col===c ? (rvSort.asc?'▲':'▼') : '⇅';
  const sel = (id, opts, cur, label) => `<select onchange="rvf.${id}=this.value;renderFinanceiro()"><option value="TODOS">${label}</option>${opts.map(o=>`<option value="${o}" ${cur===o?'selected':''}>${o}</option>`).join('')}</select>`;

  const tipoColor = t => {
    if(t==='Patrocínio') return 'var(--purple)';
    if(t==='Aporte DD') return 'var(--agp-dk)';
    if(t==='Aporte Music') return 'var(--agp-dk)';
    if(t==='Repasse Vendas') return 'var(--blue)';
    return 'var(--gray)';
  };
  const tipoTag = t => {
    if(t==='Patrocínio') return 'tag-purple';
    if(t==='Aporte DD') return 'tag-dd';
    if(t==='Aporte Music') return 'tag-green';
    return 'tag-op';
  };

  let h = `<div class="stitle"><div class="ic" style="background:var(--agp-lt);">💰</div>Detalhamento de receitas — aportes e patrocínios</div>
    <div class="detail-filters">
      ${sel('tipo', tipos, rvf.tipo, 'Todos os tipos')}
      ${sel('nome', nomes, rvf.nome, 'Todos os nomes')}
      <input type="text" placeholder="Buscar nome ou descrição..." value="${rvf.search}" oninput="rvf.search=this.value;renderFinanceiro()">
    </div>
    <div class="detail-scroll"><table class="detail-table"><thead><tr>
      <th onclick="sortRV('data')" class="${rvSort.col==='data'?'sorted':''}">Data ${ar('data')}</th>
      <th onclick="sortRV('nome')" class="${rvSort.col==='nome'?'sorted':''}">Nome ${ar('nome')}</th>
      <th>Descrição</th>
      <th onclick="sortRV('tipo')" class="${rvSort.col==='tipo'?'sorted':''}">Tipo ${ar('tipo')}</th>
      <th onclick="sortRV('valor')" class="${rvSort.col==='valor'?'sorted':''}" style="text-align:right">Valor ${ar('valor')}</th>
    </tr></thead><tbody>`;

  filtered.forEach(r => {
    h += `<tr>
      <td class="td-date">${fmtDate(r.data)}</td>
      <td style="font-size:11px;font-weight:500">${r.nome}</td>
      <td class="td-small">${(r.desc||'').substring(0,50)}${(r.desc||'').length>50?'…':''}</td>
      <td><span class="tag ${tipoTag(r.tipo)}">${r.tipo}</span></td>
      <td class="td-val" style="color:${tipoColor(r.tipo)}">${fmt(r.valor)}</td>
    </tr>`;
  });

  h += `</tbody></table></div>
    <div class="detail-summary">
      <span><strong>${filtered.length}</strong> registros</span>
      <span>Total: <strong class="vg">${fmt(totalF)}</strong></span>
    </div>`;
  document.getElementById('revenueDetailSection').innerHTML = h;
}
function sortRV(c){if(rvSort.col===c)rvSort.asc=!rvSort.asc;else{rvSort.col=c;rvSort.asc=c==='valor'?false:true;}renderFinanceiro();}

function renderDetail(allDesp){
  const cats=Array.from(new Set(allDesp.map(r=>r.categoria).filter(Boolean))).sort();
  const subcats=Array.from(new Set(allDesp.map(r=>r.subcategoria).filter(Boolean))).sort();
  const modelos=Array.from(new Set(allDesp.map(r=>r.modelo).filter(Boolean))).sort();
  const statuses=Array.from(new Set(allDesp.map(r=>r.status).filter(Boolean))).sort();
  const pagoPors=Array.from(new Set(allDesp.map(r=>r.pago_por).filter(Boolean))).sort();
  let f=allDesp.slice();
  if(df.tag!=='TODOS')f=f.filter(r=>r.tag===df.tag);if(df.cat!=='TODOS')f=f.filter(r=>r.categoria===df.cat);
  if(df.subcat!=='TODOS')f=f.filter(r=>r.subcategoria===df.subcat);if(df.modelo!=='TODOS')f=f.filter(r=>r.modelo===df.modelo);
  if(df.status!=='TODOS')f=f.filter(r=>r.status===df.status);if(df.pago_por!=='TODOS')f=f.filter(r=>r.pago_por===df.pago_por);
  if(df.search){const s=df.search.toLowerCase();f=f.filter(r=>(r.fornecedor||'').toLowerCase().includes(s)||(r.descricao||'').toLowerCase().includes(s));}
  f.sort((a,b)=>{let va,vb;if(detailSort.col==='data'){va=a.data;vb=b.data;}else if(detailSort.col==='valor'){va=a.valor;vb=b.valor;}
    else if(detailSort.col==='fornecedor'){va=(a.fornecedor||'').toLowerCase();vb=(b.fornecedor||'').toLowerCase();}
    else if(detailSort.col==='categoria'){va=a.categoria||'';vb=b.categoria||'';}
    else if(detailSort.col==='subcategoria'){va=a.subcategoria||'';vb=b.subcategoria||'';}
    else{va=a.data;vb=b.data;}if(va<vb)return detailSort.asc?-1:1;if(va>vb)return detailSort.asc?1:-1;return 0;});
  const tF=f.reduce((s,r)=>s+r.valor,0);const ar=c=>detailSort.col===c?(detailSort.asc?'▲':'▼'):'⇅';
  const sel=(id,opts,cur,label)=>`<select onchange="df.${id}=this.value;renderFinanceiro()"><option value="TODOS">${label}</option>${opts.map(o=>`<option value="${o}" ${cur===o?'selected':''}>${o}</option>`).join('')}</select>`;
  let h=`<div class="stitle"><div class="ic" style="background:var(--subtle);">🔍</div>Detalhamento de despesas</div>
    <div class="detail-filters">${sel('tag',['OPERAÇÃO','ATIVAÇÃO'],df.tag,'Todas TAGs')}${sel('cat',cats,df.cat,'Todas categorias')}${sel('subcat',subcats,df.subcat,'Todas sub-cat.')}${sel('modelo',modelos,df.modelo,'Todos modelos')}${sel('status',statuses,df.status,'Todos status')}${sel('pago_por',pagoPors,df.pago_por,'Todos — pago por')}
      <input type="text" placeholder="Buscar fornecedor ou descrição..." value="${df.search}" oninput="df.search=this.value;renderFinanceiro()"></div>
    <div class="detail-scroll"><table class="detail-table"><thead><tr>
      <th onclick="sortD('data')" class="${detailSort.col==='data'?'sorted':''}">Data ${ar('data')}</th>
      <th onclick="sortD('fornecedor')" class="${detailSort.col==='fornecedor'?'sorted':''}">Fornecedor ${ar('fornecedor')}</th><th>Descrição</th>
      <th onclick="sortD('categoria')" class="${detailSort.col==='categoria'?'sorted':''}">Cat. ${ar('categoria')}</th>
      <th onclick="sortD('subcategoria')" class="${detailSort.col==='subcategoria'?'sorted':''}">Sub-Cat. ${ar('subcategoria')}</th>
      <th>TAG</th><th>Modelo</th><th>Status</th><th>Pago por</th>
      <th onclick="sortD('valor')" class="${detailSort.col==='valor'?'sorted':''}">Valor ${ar('valor')}</th>
    </tr></thead><tbody>`;
  f.forEach(r=>{const tc=r.tag==='OPERAÇÃO'?'tag-op':'tag-at',sc=r.status==='Pago'?'status-pago':'status-pendente';
    h+=`<tr><td class="td-date">${fmtDate(r.data)}</td><td class="td-forn" title="${r.fornecedor}">${(r.fornecedor||'').substring(0,30)}${(r.fornecedor||'').length>30?'…':''}</td>
      <td title="${r.descricao}">${(r.descricao||'').substring(0,40)}${(r.descricao||'').length>40?'…':''}</td>
      <td class="td-small">${r.categoria||''}</td><td class="td-small">${r.subcategoria||''}</td>
      <td><span class="tag ${tc}">${r.tag||''}</span></td><td class="td-small">${r.modelo||''}</td>
      <td class="${sc}">${r.status||''}</td><td class="td-small">${r.pago_por||''}</td>
      <td class="td-val vr">${fmt(r.valor)}</td></tr>`;});
  h+=`</tbody></table></div><div class="detail-summary"><span><strong>${f.length}</strong> registros</span><span>Total: <strong class="vr">${fmt(tF)}</strong></span></div>`;
  document.getElementById('detailSection').innerHTML=h;
}
function sortD(c){if(detailSort.col===c)detailSort.asc=!detailSort.asc;else{detailSort.col=c;detailSort.asc=c==='valor'?false:true;}renderFinanceiro();}

eDI.addEventListener('change',renderFinanceiro);eDF.addEventListener('change',renderFinanceiro);
eRDI.addEventListener('change',renderReceitas);eRDF.addEventListener('change',renderReceitas);
renderReceitas();
</script>
</body>
